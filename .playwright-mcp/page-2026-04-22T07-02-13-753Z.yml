  - generic [ref=e233]:
    - generic [ref=e234]: 06 / Conclusion
    - heading "What We Learned" [level=2] [ref=e235]:
      - text: What We
      - emphasis [ref=e236]: Learned
    - generic [ref=e237]:
      - generic [ref=e238]:
        - paragraph [ref=e239]:
          - strong [ref=e240]: SkillGraph demonstrates that preprocessing intelligence can substitute for runtime intelligence.
          - text: By using LLMs to deeply understand skills during index construction—generating synthetic queries, building multi-vector representations—we achieve retrieval performance that exceeds state-of-the-art agentic methods while eliminating all runtime LLM calls.
        - paragraph [ref=e241]:
          - text: The
          - strong [ref=e242]: multi-vector index
          - text: (skill embedding + synthetic query embeddings) is the core innovation. It transforms the retrieval problem from "match query to skill name" to "match query to user intent"—a fundamentally easier problem because the synthetic queries are generated from the same distribution as real user queries.
        - paragraph [ref=e243]:
          - strong [ref=e244]: Speed and accuracy are not contradictory.
          - text: At 17.5ms per query and 72.1% Recall@10, SkillGraph surpasses the UCSB agentic baseline (68.3%) by 3.8pp while being ~170x faster. For latency-sensitive agent systems, this is transformative.
      - paragraph [ref=e247]:
        - strong [ref=e248]: "Key Takeaway:"
        - text: The future of agent skill retrieval lies not in smarter runtime reasoning, but in
        - emphasis [ref=e249]: smarter index construction
        - text: . Every token spent during preprocessing pays dividends at runtime—in latency, cost, and reliability.
