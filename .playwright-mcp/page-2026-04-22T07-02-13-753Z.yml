  - generic [ref=e57]:
    - generic [ref=e58]: 02 / Core Insight
    - heading "Intelligence Belongs in the Index, Not the Runtime" [level=2] [ref=e59]:
      - text: Intelligence Belongs in the
      - emphasis [ref=e60]: Index
      - text: ", Not the Runtime"
    - paragraph [ref=e61]: "The key realization: we can afford to use LLMs during preprocessing—once per skill—but we cannot afford LLM calls at query time."
    - generic [ref=e62]:
      - text: "\"What if, instead of asking an LLM to understand skills at query time, we ask it to understand them once—during index construction—and embed that understanding directly into the retrieval index?\""
      - generic [ref=e63]: — Central Design Principle of SkillGraph
    - generic [ref=e64]:
      - generic [ref=e65]:
        - paragraph [ref=e66]:
          - text: For each of the 34,000 skills, we use an LLM (Kimi k1.5) to generate
          - strong [ref=e67]: 10 diverse synthetic user queries
          - text: —the kinds of natural language questions that would lead a user to this skill.
        - paragraph [ref=e68]:
          - text: For
          - code [ref=e69]: pcap-analysis
          - text: ", the LLM generates queries like:"
        - paragraph [ref=e70]: "\"analyze network packet captures\" · \"detect port scanning in traffic logs\" · \"compute network statistics from pcap files\""
        - paragraph [ref=e71]:
          - text: These synthetic queries are embedded and stored alongside the skill's own embedding, creating a
          - strong [ref=e72]: multi-vector representation
          - text: of each skill. At runtime, retrieval becomes a simple vector similarity search—
          - strong [ref=e73]: zero tokens, millisecond latency
          - text: .
      - heading "Preprocessing vs. Runtime Cost" [level=4] [ref=e76]
