          - paragraph [ref=e269]: Current synthetic queries are static. An adaptive approach—monitoring which synthetic queries actually retrieve their parent skill on real user queries, and re-generating underperforming ones—could continuously improve index quality without human intervention.
      - generic [ref=e270]:
