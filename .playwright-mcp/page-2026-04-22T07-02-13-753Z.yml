          - paragraph [ref=e264]: Current SACR uses community centroids for routing. Replacing this with a learned graph attention mechanism—where community relevance is conditioned on the query embedding through attention weights—could reduce the recall gap between SACR and dense retrieval from 3pp to near-zero.
      - generic [ref=e265]:
