          - paragraph [ref=e274]: "The ultimate vision: a retrieval module so fast and accurate that it becomes invisible. The agent simply states its intent, and the right skills are loaded automatically—no explicit retrieval step, no latency perceived by the user. SkillGraph is a step toward that vision."
